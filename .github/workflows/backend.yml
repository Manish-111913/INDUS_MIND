name: backend

# Lint + type-check + full pytest against real Postgres(pgvector)/Redis/MinIO/Neo4j
# service containers (docs/02 §45, §54). All three are hard gates: ruff (E501
# included), mypy (clean across the app), and the services-backed pytest suite.

on:
  push:
    branches: [main, master]
    paths: ["BACKEND/**", ".github/workflows/backend.yml"]
  pull_request:
    paths: ["BACKEND/**", ".github/workflows/backend.yml"]

defaults:
  run:
    working-directory: BACKEND

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      APP_ENV: ci
      RATE_LIMIT_ENABLED: "false"
      LOG_LEVEL: WARNING
      SECRET_KEY: ci-test-secret
      DATABASE_URL: postgresql+asyncpg://indusmind:indusmind@localhost:5432/indusmind
      REDIS_URL: redis://localhost:6379/0
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: indusmind-neo4j
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: indusmind
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      AWS_REGION: us-east-1

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: indusmind
          POSTGRES_PASSWORD: indusmind
          POSTGRES_DB: indusmind
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U indusmind -d indusmind"
          --health-interval 5s --health-timeout 5s --health-retries 20

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 20

      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/indusmind-neo4j
        ports: ["7474:7474", "7687:7687"]
        options: >-
          --health-cmd "wget -qO- http://localhost:7474 || exit 1"
          --health-interval 10s --health-timeout 5s --health-retries 20

      minio:
        # bitnami image auto-starts the server and creates MINIO_DEFAULT_BUCKETS,
        # so no separate bootstrap step is needed (plain minio/minio needs a CMD).
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: indusmind
        ports: ["9000:9000"]
        options: >-
          --health-cmd "mc ready local || exit 1"
          --health-interval 10s --health-timeout 5s --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: BACKEND/pyproject.toml

      - name: Install system libs (libmagic for MIME sniffing)
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff (lint, incl. E501) — hard gate
        run: ruff check .

      - name: Mypy (type check) — hard gate
        run: mypy app

      - name: Pytest (services-backed) — hard gate
        # Test fixtures provision the schema (create extensions + create_all) and
        # clean state per test; no separate migrate/seed step is required.
        run: pytest -q -p no:cacheprovider
