name: eval-nightly

# Nightly AI-quality eval (docs/02 §45 eval.yml, §54): seed the demo corpus, run
# the 25-question benchmark through the copilot, and post the score table
# (fact-coverage / citation-accuracy / latency) to the job summary — the judging
# metric, automated. Runs with the deterministic embedder + extractor (no API key
# required); set ANTHROPIC_API_KEY as a repo secret to eval the real LLM path.

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC nightly
  workflow_dispatch: {} # allow manual runs

defaults:
  run:
    working-directory: BACKEND

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      APP_ENV: ci
      RATE_LIMIT_ENABLED: "false"
      LOG_LEVEL: WARNING
      SECRET_KEY: ci-eval-secret
      DATABASE_URL: postgresql+asyncpg://indusmind:indusmind@localhost:5432/indusmind
      REDIS_URL: redis://localhost:6379/0
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: indusmind-neo4j
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: indusmind
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      AWS_REGION: us-east-1
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: indusmind
          POSTGRES_PASSWORD: indusmind
          POSTGRES_DB: indusmind
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U indusmind -d indusmind"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 20
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/indusmind-neo4j
        ports: ["7474:7474", "7687:7687"]
        options: >-
          --health-cmd "wget -qO- http://localhost:7474 || exit 1"
          --health-interval 10s --health-timeout 5s --health-retries 20
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: indusmind
        ports: ["9000:9000"]
        options: >-
          --health-cmd "mc ready local || exit 1"
          --health-interval 10s --health-timeout 5s --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: BACKEND/pyproject.toml

      - name: Install system libs
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Apply migrations
        run: alembic upgrade head

      - name: Seed demo corpus (with documents)
        env:
          SEED_DOCUMENTS: "1"
        run: python -m seeds.seed

      - name: Run eval → job summary
        run: |
          set -o pipefail
          python -m evals.run_eval | tee eval_report.txt
          {
            echo "## IndusMind Copilot — Nightly Eval"
            echo ""
            echo '```'
            cat eval_report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: BACKEND/eval_report.txt
