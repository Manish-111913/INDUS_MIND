name: indusmind

x-app-env: &app-env
  APP_ENV: ${APP_ENV:-local}
  SECRET_KEY: ${SECRET_KEY:-change-me-dev-secret}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  DATABASE_URL: postgresql+asyncpg://indusmind:indusmind@postgres:5432/indusmind
  REDIS_URL: redis://redis:6379/0
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: indusmind-neo4j
  S3_ENDPOINT: http://minio:9000
  S3_BUCKET: indusmind
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin
  AWS_REGION: ${AWS_REGION:-us-east-1}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
  SMTP_HOST: mailhog
  SMTP_PORT: "1025"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: indusmind
      POSTGRES_PASSWORD: indusmind
      POSTGRES_DB: indusmind
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indusmind -d indusmind"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/indusmind-neo4j
      NEO4J_PLUGINS: '["apoc"]'
    ports: ["7474:7474", "7687:7687"]
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # one-shot: create the "indusmind" bucket then exit
  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/indusmind &&
      mc anonymous set download local/indusmind/public || true &&
      echo 'bucket ready';
      "
    restart: "no"

  mailhog:
    image: mailhog/mailhog:latest
    ports: ["1025:1025", "8025:8025"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment: *app-env
    ports: ["8000:8000"]
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A app.workers.celery_app.celery worker --loglevel=INFO -Q ingestion,ai,notify,scheduled,default
    environment: *app-env
    volumes:
      - ./:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A app.workers.celery_app.celery beat --loglevel=INFO
    environment: *app-env
    volumes:
      - ./:/app
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
  neo4jdata:
  redisdata:
  miniodata:
