name: frontend

# Type-check (tsc --noEmit) + production build (docs/02 §45). The frontend is
# Vite + React (not Next.js); `npm run lint` is the tsc type-check. Vitest runs
# only if a `test` script is present, so this stays green until tests are added.

on:
  push:
    branches: [main, master]
    paths: ["FRONTEND/**", ".github/workflows/frontend.yml"]
  pull_request:
    paths: ["FRONTEND/**", ".github/workflows/frontend.yml"]

defaults:
  run:
    working-directory: FRONTEND

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: FRONTEND/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npm run lint

      - name: Unit tests (vitest, if configured)
        run: |
          if npm run | grep -qE '^  test'; then
            npm test -- --run
          else
            echo "No 'test' script configured — skipping vitest."
          fi

      - name: Build
        run: npm run build
